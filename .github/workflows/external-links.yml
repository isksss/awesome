name: External links

on:
  schedule:
    - cron: "0 3 1,15 * *"
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,206,429 './**/*.md'
